
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
      <header class="header">
  <div class="logo">
    <img id="icon" src="assets/Gato do rock.gif" title="No More Tears">
  </div>
<h1>ONG - Me Audota</h1>
  <nav class="nav">
    
    <a href="#">Início</a><br>
    <a href="#">Adoção</a><br>
    <a href="#">Sobre Nós</a>
  </nav>

  
</header>
    <main id="Corpo">
        <form action="" method="get" id="FormAdocaoCaes">
            <div>
                <label for="NomeUsuario" >Nome completo: </label><br>
                <input id="NomeUsuario" type="text" placeholder="Ex: Daniel Tonioti" class="InputsN">
            </div>
            <div>
                <label for="EmailUsuario">E-mail: </label><br>
                <input type="email" id="EmailUsuario" placeholder="Ex: Daniel_tonioti@gmail.com" class="InputsN">
            </div>
            <div>
                <label for="TelefoneUsuario">Telefone: </label><br>
                <input type="tel" id="TelefoneUsuario" placeholder="xx9xxxxxxxx"
                 minlength= "8" maxlength="11" title="Tem que ser no seguinte formato: xx9xxxxxxxx" class="InputsN">
            </div>
            <div>
                <label for="CpfUsuario">CPF: </label><br>
                <input type="text" id="CpfUsuario" placeholder="00000000000"
                    maxlength="11" pattern="\d{11}" title="Digite o CPF sem pontos" class="InputsN" required>
            </div>
            <div>
                <label for="SalarioUsuario">Salário: </label><br>
                <input type="text" id="SalarioUsuario" placeholder="Ex: 2000" min="1000" class="InputsN">
            </div>
            <div>
                <label for="IdadeUsuario">Idade: </label><br>
                <input type="number" id="IdadeUsuario" placeholder="Insira em anos" class="InputsN" min="18">
            </div>
            <div>
                <label for="CidadeUsuario">Qual a sua cidade?</label><br>
                <input type="text" id="CidadeUsuario" placeholder="Cidade - Estado, País" title="Coloque na seguinte formatação: Cidade - Estado, País" class="InputsN" required>
            </div>
            <div>
                <label for="Morada">Morada: </label><br>
                <select id="Morada">
                    <option value="" disabled selected>Selecione uma das opcoes</option>
                    <option value="Casa">Casa</option>
                    <option value="Ap">Apartamento</option>
                </select required>  
            </div>
            <div class="hidden" id="DivPermissao">
               <label>O local permite animais de estimação?</label><br>
               <input type="radio" id="PermiteSim"  value=true required>
                  <label for="PermiteSim">Sim</label><br>
                  <input type="radio" id="PermiteNao"  value=false required>
                    <label for="PermiteNao">Nao</label>
            </div>
            <div class="hidden" id="Quintal">
                <label>Possui Quintal?</label><br>
                <input type="radio" name="PossuiQuintal" id="QuintalSIm" value=true required>
                <label for="QuintalSIm">Sim</label><br>
                <input type="radio" name="PossuiQuintal" id="QuintalNao" value=false required>
                <label for="QuintalNao">Nao</label>
            </div>
            <div class="hidden" id="DivSeguranca">
               <label>O quintal é seguro?</label><br>
               <input type="radio" name="Quintal" id="SegSim" value=true required>
                  <label for="SegSim">Sim</label><br>
                  <input type="radio" name="Quintal" id="SegNao" value=false required>
                    <label for="SegNao">Nao</label>
            </div>
            <div>
                <label for="QuererAnimal">A quantos dias você quer adotar?</label><br>
                <input type="number" id="QuererAnimal" placeholder="Insira em dias" min="0" class="InputsN">
            </div>
            <div>
                <label id="PetANTES">Já teve pet antes?</label><br>
                <input type="radio" name="Petantes" id="PetSim" value=true required>
                <label for="PetSim">Sim</label><br>
                <input type="radio" name="Petantes" id="PetNao" value=false required>
                <label for="PetNao">Nao</label>
            </div>
            <div>
                <label for="PetSozinho">Tempo sozinho: </label><br>
                <input type="number" id="PetSozinho" placeholder="Insira em horas" min="0" max="24" class="InputsN">
            </div>
            <div>
                <label for="MotivoAdocao">Motivo da adoção: </label><br>
                <textarea id="MotivoAdocao" placeholder="Inserir texto" minlength="10"></textarea>
            </div>
            <div>
                <input type="checkbox" id="Termos" value="Termos" required>
                <label for="Termos">Aceite os <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1">termos de responsabilidade</a></label>
            </div>
            <div>
    
            </div>
            <button type="submit" id="submit">submit</button>
            <script src="scripts.js"></script>
            <div id="Botao"></div>
        </form>
    </main>
    <footer>
        <p>Todos os direitos reservados a Daniel Tonioti</p>
    </footer>
</body>
</html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="" method="get" id="FormAdocaoCaes">
        <div>
            <label for="NomeUsuario" >Nome completo: </label>
            <input id="NomeUsuario" type="text" placeholder="Ex: Daniel Tonioti">
        </div>
        <div>
            <label for="EmailUsuario">E-mail: </label>
            <input type="email" id="EmailUsuario" placeholder="Ex: Daniel_tonioti@gmail.com">
        </div>
        <div>
            <label for="TelefoneUsuario">Telefone: </label>
            <input type="tel" id="TelefoneUsuario" placeholder="xx9xxxxxxxx"
             minlength= "8" maxlength="11" title="Tem que ser no seguinte formato: xx9xxxxxxxx">
        </div>
        <div>
            <label for="CpfUsuario">CPF: </label>
            <input type="text" id="cpf" name="cpf" placeholder="00000000000"
                maxlength="14" pattern="\d{11}" title="Digite o CPF sem pontos" required>
        </div>
        <div>
            <label for="IdadeUsuario">Idade: </label>
            <input type="number" id="IdadeUsuario" placeholder="Insira em anos">
        </div>
        <div>
            <label for="CidadeUsuario">Qual a sua cidade?</label>
            <input type="text" placeholder="Cidade - Estado, País" title="Coloque na seguinte formatação: Cidade - Estado, País" required>
        </div>
        <div>
            <label for="Morada">Morada: </label>
            <select name="Morada" id="Morada">
                <option value="" disabled selected>Selecione uma das opcoes</option>
                <option value="Casa">Casa</option>
                <option value="Ap">Apartamento</option>
            </select required>  
        </div>
        <div class="hidden" id="DivPermissao">
           <label>O local permite animais de estimação?</label>
              <label for="PermiteSim">Sim</label>
                <input type="radio" id="PermiteSim" name="Permite" value=true required><br>
                <label for="PermiteNao">Nao</label>
                <input type="radio" id="PermiteNao" name="Permite" value=false required>
        </div>
        <div>
            <label>Possui Quintal?</label><br>
            <label for="QuintalSIm">Sim</label>
            <input type="radio" id="QuintalSIm" name="Quintal" value=true required><br>
            <label for="QuintalNao">Nao</label>
            <input type="radio" id="QuintalNao" name="Quintal" value=false required>
        </div>
        <div class="hidden" id="DivSeguranca">
           <label>O quintal é seguro?</label>
              <label for="SegSim">Sim</label>
                <input type="radio" id="SegSim" name="Seguranca" value=true required><br>
                <label for="SegNao">Nao</label>
                <input type="radio" id="SegNao" name="Seguranca" value=false required>
        </div>
        <div>
            <label>Já teve pet antes?</label><br>
            <label for="PetSim">Sim</label>
            <input type="radio" id="PetSim" name="Quintal" value=true required><br>
            <label for="PetNao">Nao</label>
            <input type="radio" id="PetNao" name="Quintal" value=false required>
        </div>
        <div>
            <label for="PetSozinho">Tempo sozinho: </label>
            <input type="number" id="PetSozinho" placeholder="Insira em horas" min="0" max="24">
        </div>
        <div>
            <label for="MotivoAdocao"></label>
            <textarea name="MotivoAdocao" id="MotivoAdocao" placeholder="Inserir texto" minlength="10"></textarea>
        </div>
        <div>
            <input type="checkbox" id="Termos" value="Termos" required>
            <label for="Termos">Aceite os <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1">termos de responsabilidade</a></label>
        </div>
        <div>

        </div>
        <button type="submit">subtmit</button>
        <script src="scripts.js"></script>
    </form>
</body>
</html>
